<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Whisper Transcription</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 860px; }
      label { display:block; margin-top: 14px; font-weight: 600; }
      input[type=text], input[type=file] { width: 100%; padding: 10px; font-size: 16px; }
      button { margin-top: 18px; padding: 12px 16px; font-size: 16px; }
      code { background:#f4f4f4; padding:2px 6px; border-radius:6px; }
      table { border-collapse: collapse; width: 100%; margin-top: 18px; }
      th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align:left; }
      .hint { color:#555; font-size: 14px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>Whisper transcription</h1>
    <div class="hint">Model: <code>{{ model }}</code></div>
    <div class="hint">After upload, you'll get a live status page with streaming logs (SSE).</div>

    <form action="/transcribe" method="post" enctype="multipart/form-data">
      <label>Job name (optional)</label>
      <input type="text" name="name" placeholder="e.g. meeting_2026_05_09" />
      <div class="hint">Filename-safe: letters/numbers/_/-</div>

      <label>Audio file (mp3/wav/m4a)</label>
      <input type="file" name="audio" required />

      <button type="submit">Transcribe</button>
    </form>

    <h2>Recent outputs (VTT)</h2>
    <table>
      <thead><tr><th>File</th><th>Download</th></tr></thead>
      <tbody>
        {% for o in outs %}
          <tr>
            <td>{{ o.name }}</td>
            <td><a href="/out/{{ o.name }}">download</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
