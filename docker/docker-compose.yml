services:
  whisper_service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: whisper_service
    restart: unless-stopped
    ports:
      - "${UI_PORT:-4060}:4060"
    environment:
      - DATA_DIR=/data
    volumes:
      - ${DATA_DIR:-./data}:/data
      # Models live in the image by default. Only mount /models if you know what you're doing.
      # - ${MODELS_DIR:-./models}:/models
